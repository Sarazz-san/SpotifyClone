name: Build Android APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm ci

      - name: Patch react-native-document-picker
        run: |
          FILE="node_modules/react-native-document-picker/android/src/main/java/com/reactnativedocumentpicker/RNDocumentPickerModule.java"
          # Remove problematic import
          sed -i 's/import com.facebook.react.bridge.GuardedResultAsyncTask;//' $FILE
          
          # Replace GuardedResultAsyncTask with standard AsyncTask
          sed -i 's/extends GuardedResultAsyncTask<ReadableArray>/extends android.os.AsyncTask<Void, Void, ReadableArray>/' $FILE
          sed -i 's/protected ReadableArray doInBackgroundGuarded()/protected ReadableArray doInBackground(Void... voids)/' $FILE
          sed -i 's/protected void onPostExecuteGuarded(ReadableArray result)/protected void onPostExecute(ReadableArray result)/' $FILE
          
          # Fix constructor calls and super calls (commenting out problematic ones)
          sed -i 's/super(reactContext);/\/\/ super(reactContext);/' $FILE
          sed -i 's/super(reactContext.getExceptionHandler());/\/\/ super();/' $FILE
          
          # Ensure RNDocumentPickerModule constructor is correctly calling super
          sed -i 's/public RNDocumentPickerModule(ReactApplicationContext reactContext) {/public RNDocumentPickerModule(ReactApplicationContext reactContext) { super(reactContext);/' $FILE

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create google-services.json placeholder
        run: |
          if [ ! -f android/app/google-services.json ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
            if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
              echo "Warning: GOOGLE_SERVICES_JSON secret is empty. Creating a dummy file to avoid build failure."
              echo '{"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.spotifyclone.mobile"}},"api_key":[{"current_key":"dummy"}],"services":{"appinvite_service":{"status":1,"other_platform_id":[]},"ads_service":{"status":1}}}],"configuration_version":"1"}' > android/app/google-services.json
            fi
          fi

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" -Dorg.gradle.workers.max=2

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
